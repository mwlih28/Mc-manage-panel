name: Notify installers of new release

# Triggers when you push a version tag like v1.2.0
on:
  push:
    tags:
      - 'v*.*.*'
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v1.2.0)'
        required: true
      changelog_url:
        description: 'Changelog URL (optional)'
        required: false

jobs:
  notify:
    name: Send update emails
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "changelog=${{ github.event.inputs.changelog_url }}" >> $GITHUB_OUTPUT
          else
            # Strip refs/tags/ prefix
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "changelog=https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Send update notifications
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          CHANGELOG="${{ steps.vars.outputs.changelog }}"
          PAYLOAD="{\"version\":\"$VERSION\",\"changelogUrl\":\"$CHANGELOG\"}"

          echo "Sending update notification for $VERSION..."

          RESPONSE=$(curl -sf \
            -X POST "${{ secrets.REGISTRY_PANEL_URL }}/api/v1/installer/notify-updates" \
            -H "Content-Type: application/json" \
            -H "X-Notify-Secret: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}" \
            -d "$PAYLOAD" \
            --max-time 30)

          echo "Response: $RESPONSE"

          SENT=$(echo "$RESPONSE" | grep -o '"sent":[0-9]*' | grep -o '[0-9]*' || echo 0)
          TOTAL=$(echo "$RESPONSE" | grep -o '"total":[0-9]*' | grep -o '[0-9]*' || echo 0)

          echo "✅ Sent $SENT of $TOTAL update emails for $VERSION"
