name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege default: neither job needs to write anything except the
# image-push step below, which grants itself `packages: write` explicitly.
permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Generate Prisma Client (SQLite for CI)
        working-directory: apps/api
        run: |
          sed -i 's/provider = "postgresql"/provider = "sqlite"/' prisma/schema.prisma
          DATABASE_URL="file:./test.db" npx prisma@5 generate

      - name: TypeCheck API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: TypeCheck Web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Test API
        working-directory: apps/api
        run: npm test

      - name: Test Web
        working-directory: apps/web
        run: npm test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR/Docker image names must be lowercase, but this repo's name
      # (Mc-manage-panel) isn't — ${{ github.repository }} used directly
      # in a tag fails with "repository name must be lowercase".
      - name: Compute lowercase image repository
        run: echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build and push API
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/api:latest
            ghcr.io/${{ env.IMAGE_REPO }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: apps/web
          push: true
          build-args: |
            VITE_API_URL=${{ vars.API_URL }}
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/web:latest
            ghcr.io/${{ env.IMAGE_REPO }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
