version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mcpanel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcpanel
      POSTGRES_PASSWORD: mcpanel
      POSTGRES_DB: mcpanel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mcpanel-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://mcpanel:mcpanel@postgres:5432/mcpanel
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-secret-key-min-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-key-min-32chars}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      APP_NAME: MC Manage Panel
      PANEL_VERSION: 1.0.0
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL:-http://localhost:3001}
    container_name: mcpanel-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
